name: Setup Keystore (Rodar apenas uma vez)

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Nome da chave (ex: compatcontrol)'
        required: true
        default: 'compatcontrol'
      keystore_password:
        description: 'Senha da keystore'
        required: true
      key_password:
        description: 'Senha da chave (pode ser igual à da keystore)'
        required: true
      owner_name:
        description: 'Seu nome (para o certificado)'
        required: true
        default: 'DarkKdevon'
      org_name:
        description: 'Nome da organização (pode ser seu nome)'
        required: true
        default: 'CompatControl'

jobs:
  generate-keystore:
    runs-on: ubuntu-latest

    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gerar Keystore
        run: |
          keytool -genkey -v \
            -keystore compatcontrol.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias "${{ github.event.inputs.key_alias }}" \
            -storepass "${{ github.event.inputs.keystore_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=${{ github.event.inputs.owner_name }}, O=${{ github.event.inputs.org_name }}, C=BR"

      - name: Mostrar valores para copiar nos Secrets
        run: |
          echo "============================================"
          echo " COPIE OS VALORES ABAIXO PARA OS SECRETS"
          echo "============================================"
          echo ""
          echo ">> Vá em: Settings → Secrets and variables → Actions"
          echo ">> Clique em 'New repository secret' para cada um:"
          echo ""
          echo "--------------------------------------------"
          echo "Secret: KEYSTORE_BASE64"
          echo "Valor:"
          base64 -w 0 compatcontrol.jks
          echo ""
          echo "--------------------------------------------"
          echo "Secret: KEYSTORE_PASSWORD"
          echo "Valor: ${{ github.event.inputs.keystore_password }}"
          echo ""
          echo "--------------------------------------------"
          echo "Secret: KEY_ALIAS"
          echo "Valor: ${{ github.event.inputs.key_alias }}"
          echo ""
          echo "--------------------------------------------"
          echo "Secret: KEY_PASSWORD"
          echo "Valor: ${{ github.event.inputs.key_password }}"
          echo ""
          echo "============================================"
          echo " APÓS ADICIONAR OS SECRETS, FAÇA UM PUSH"
          echo " NA MAIN PARA GERAR O APK AUTOMATICAMENTE"
          echo "============================================"

      - name: Salvar keystore como artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: keystore-backup
          path: compatcontrol.jks
          retention-days: 1
